version: '3.8'


services:
  # 1. PostgreSQL (Port 5432) - 1 instance, nhiều DB
  postgres:
    image: postgres:15
    container_name: fintech-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: default_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount file script vào thư mục khởi tạo của container
      - ./init-scripts/init-multiple-psql-databases.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fintech-network

  # 2. Redis (Port 6379)
  redis:
    image: redis:7
    container_name: fintech-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - fintech-network

  # 3. Zookeeper (Cần thiết để chạy Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: fintech-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - fintech-network

  # 4. Kafka (Port 9092)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: fintech-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - fintech-network

  # 5. Zipkin (Port 9411)
  zipkin:
    image: openzipkin/zipkin
    container_name: fintech-zipkin
    restart: always
    ports:
      - "9411:9411"
    networks:
      - fintech-network

  # 6. Prometheus (Port 9090)
  prometheus:
    image: prom/prometheus:latest
    container_name: fintech-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - fintech-network

  # 7. Grafana (Port 3000)
  grafana:
    image: grafana/grafana:latest
    container_name: fintech-grafana
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - fintech-network

networks:
  fintech-network:
    driver: bridge

volumes:
  postgres_data: